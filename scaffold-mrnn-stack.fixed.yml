                          <div class="log-entry"><span class="log-time">[INIT]</span> System boot...</div>
                      </div>
          
                      <h3 style="margin-top:20px">◈ Active Channels</h3>
                      <div id="channelList" style="font-size:11px; opacity:0.7;">
                          Waiting for signal...
