      # ─────────────────────────────────────────
      # 9. COMMIT SCAFFOLDED FILES
      # ─────────────────────────────────────────
      - name: Commit scaffolded code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🧠 Auto-scaffold: MRNN + Orchestrator + Web stack [skip ci]"
          git push

      # ─────────────────────────────────────────
      # 10. RUN TESTS
      # ─────────────────────────────────────────
      - name: Run test suite
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v

      # ─────────────────────────────────────────
      # 11. DEPLOY (conditional)
      # ─────────────────────────────────────────
      - name: Deploy to Netlify
        if: github.event.inputs.deploy_target == 'netlify' || github.event_name == 'push'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy --prod --dir=src/web --message "Auto-deploy from GitHub Actions"

      - name: Trigger Render Deploy
        if: github.event.inputs.deploy_target == 'render'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "Render hook not configured"
