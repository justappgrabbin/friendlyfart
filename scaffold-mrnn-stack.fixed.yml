      - name: Generate test suite
        run: |
          cat > tests/unit/test_mrnn.py << 'TESTEOF'
          import unittest, sys, os
          sys.path.insert(0, os.path.join(os.path.dirname(__file__), '../../src'))
          from mrnn.engine import MRNN, FuxiEncoder, MonopoleRouter
          
          class TestMRNN(unittest.TestCase):
              def test_initialization(self):
                  net = MRNN(seed_hexagram=1)
                  self.assertEqual(len(net.gates), 64)
                  self.assertEqual(len(net.channels), 36)
          
              def test_fuxi_encoding(self):
                  encoder = FuxiEncoder()
                  code = encoder.encode("BB")
                  self.assertIsInstance(code, list)
                  self.assertEqual(len(code), 2)
          
              def test_signal_flow(self):
                  net = MRNN(seed_hexagram=1)
                  result = net.ingest("TEST")
                  self.assertIn("gates_activated", result)
                  self.assertTrue(len(result["gates_activated"]) > 0)
          
              def test_monopole_routing(self):
                  router = MonopoleRouter()
                  path = router.route("LOVE", target="HEART")
                  self.assertIsInstance(path, list)
                  self.assertTrue(len(path) > 0)
          
              def test_full_cycle(self):
                  net = MRNN(seed_hexagram=1)
                  result = net.cycle("LOVE")
                  self.assertIn("INGEST", result)
                  self.assertIn("EXECUTE", result)
                  self.assertEqual(result["EXECUTE"]["who"], "AGENT")
          
          if __name__ == '__main__':
              unittest.main()
          TESTEOF

          cat > tests/integration/test_stack.py << 'INTEOF'
          import unittest, sys, os
          sys.path.insert(0, os.path.join(os.path.dirname(__file__), '../../src'))
          from mrnn.engine import MRNN
          from orchestrator.orchestrator import AutonomousOrchestrator
          
