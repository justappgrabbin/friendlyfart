              </div>
          
              <script>
                  // ─────────────────────────────────────────
                  // MRNN WEB CLIENT
                  // ─────────────────────────────────────────
          
                  const GATES = 64;
                  const LAYERS = 5;
                  let activeGates = new Set();
                  let currentLayer = 1;
                  let resonanceField = new Array(64).fill(0);
          
                  // Initialize gate grid
                  function initGateGrid() {
                      const grid = document.getElementById('gateGrid');
                      for (let i = 1; i <= GATES; i++) {
                          const cell = document.createElement('div');
                          cell.className = 'gate-cell';
                          cell.textContent = i;
                          cell.dataset.gate = i;
                          cell.onclick = () => toggleGate(i);
                          grid.appendChild(cell);
                      }
                  }
          
                  function toggleGate(n) {
                      const cell = document.querySelector(`[data-gate="${n}"]`);
                      if (activeGates.has(n)) {
                          activeGates.delete(n);
                          cell.classList.remove('active');
                      } else {
                          activeGates.add(n);
                          cell.classList.add('active');
                      }
                      updateField();
                  }
          
                  // Canvas visualization
                  function initCanvas() {
                      const canvas = document.getElementById('fieldCanvas');
                      const ctx = canvas.getContext('2d');
          
                      function draw() {
                          ctx.fillStyle = '#0a0a0f';
                          ctx.fillRect(0, 0, canvas.width, canvas.height);
          
                          // Draw resonance field as circular visualization
                          const cx = canvas.width / 2;
                          const cy = canvas.height / 2;
                          const radius = 120;
          
                          // Background rings
                          for (let r = 40; r <= 160; r += 40) {
                              ctx.beginPath();
                              ctx.arc(cx, cy, r, 0, Math.PI * 2);
                              ctx.strokeStyle = `rgba(0, 212, 170, ${0.1 - r/2000})`;
                              ctx.lineWidth = 1;
                              ctx.stroke();
                          }
          
                          // Active gates as points
                          activeGates.forEach(gate => {
                              const angle = (gate / 64) * Math.PI * 2 - Math.PI / 2;
                              const dist = radius + (resonanceField[gate-1] * 60);
                              const x = cx + Math.cos(angle) * dist;
                              const y = cy + Math.sin(angle) * dist;
          
                              // Gate glow
                              const gradient = ctx.createRadialGradient(x, y, 0, x, y, 20);
                              gradient.addColorStop(0, 'rgba(0, 212, 170, 0.8)');
                              gradient.addColorStop(1, 'rgba(0, 212, 170, 0)');
                              ctx.fillStyle = gradient;
                              ctx.fillRect(x - 20, y - 20, 40, 40);
          
                              // Gate point
                              ctx.beginPath();
                              ctx.arc(x, y, 4, 0, Math.PI * 2);
                              ctx.fillStyle = '#00d4aa';
                              ctx.fill();
                          });
          
                          // Connecting lines between active gates
                          const gates = Array.from(activeGates);
                          ctx.strokeStyle = 'rgba(0, 168, 232, 0.2)';
                          ctx.lineWidth = 1;
                          for (let i = 0; i < gates.length; i++) {
                              for (let j = i + 1; j < gates.length; j++) {
                                  const a1 = (gates[i] / 64) * Math.PI * 2 - Math.PI / 2;
                                  const a2 = (gates[j] / 64) * Math.PI * 2 - Math.PI / 2;
                                  const x1 = cx + Math.cos(a1) * radius;
                                  const y1 = cy + Math.sin(a1) * radius;
                                  const x2 = cx + Math.cos(a2) * radius;
                                  const y2 = cy + Math.sin(a2) * radius;
                                  ctx.beginPath();
                                  ctx.moveTo(x1, y1);
                                  ctx.lineTo(x2, y2);
                                  ctx.stroke();
                              }
                          }
          
                          requestAnimationFrame(draw);
                      }
          
                      draw();
                  }
          
                  function updateField() {
                      // Simple field update based on active gates
                      resonanceField = resonanceField.map((v, i) => {
                          if (activeGates.has(i + 1)) return 1.0;
                          return Math.max(0, v - 0.05);
                      });
                  }
          
                  // Logging
                  function log(msg, layer = 0) {
                      const stream = document.getElementById('logStream');
                      const entry = document.createElement('div');
                      entry.className = 'log-entry';
                      const time = new Date().toLocaleTimeString();
                      const layerClass = layer > 0 ? `log-layer-${layer}` : '';
                      entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${layerClass}">${msg}</span>`;
                      stream.appendChild(entry);
                      stream.scrollTop = stream.scrollHeight;
                  }
          
                  // Layer animation
                  function activateLayer(n) {
                      document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
                      document.querySelector(`[data-layer="${n}"]`).classList.add('active');
                      currentLayer = n;
                  }
          
                  // Process signal through layers
                  async function processSignal() {
                      const signal = document.getElementById('signalInput').value || 'BB';
                      log(`Processing signal: "${signal}"`, 1);
          
                      // Layer 1: INGEST
                      activateLayer(1);
                      log('Fuxi encoding...', 1);
                      await wait(500);
          
                      // Hash to gates
                      const encoded = signal.split('').map(c => c.charCodeAt(0) % 64 + 1);
                      encoded.forEach(g => activeGates.add(g));
                      updateGateGrid();
                      log(`Gates activated: ${Array.from(activeGates).join(', ')}`, 1);
          
                      // Layer 2: ANALYZE
                      activateLayer(2);
                      log('Analyzing channel resonance...', 2);
                      await wait(600);
                      const channels = findChannels(Array.from(activeGates));
                      document.getElementById('channelList').innerHTML = channels.map(c => 
                          `<div>◈ Gate ${c[0]} ↔ Gate ${c[1]}</div>`
                      ).join('');
                      log(`Channels opened: ${channels.length}`, 2);
          
                      // Layer 3: ADDRESS
                      activateLayer(3);
                      log('Monopole routing...', 3);
                      await wait(500);
          
                      // Layer 4: SEND
                      activateLayer(4);
                      log('Fibonacci scheduling...', 4);
                      await wait(500);
          
                      // Layer 5: EXECUTE
                      activateLayer(5);
                      log('Executing callbacks...', 5);
                      await wait(400);
                      log('Cycle complete.', 5);
          
                      // Reset to idle
                      setTimeout(() => activateLayer(1), 2000);
                  }
          
                  function findChannels(gates) {
                      const channels = [
                          [1,8],[2,14],[3,60],[4,63],[5,15],[6,59],
                          [7,31],[9,52],[10,20],[11,56],[12,22],[13,33],
                          [16,48],[17,62],[18,58],[19,49],[21,45],[23,43],
                          [24,61],[25,51],[26,44],[27,50],[28,38],[29,46],
                          [30,41],[32,54],[34,57],[35,36],[37,40],[39,55],
                          [42,53],[47,64],[10,34],[20,57],[28,46],[44,26]
                      ];
                      return channels.filter(c => gates.includes(c[0]) || gates.includes(c[1]));
                  }
          
                  function updateGateGrid() {
                      document.querySelectorAll('.gate-cell').forEach(cell => {
                          const g = parseInt(cell.dataset.gate);
                          cell.classList.toggle('active', activeGates.has(g));
                      });
                  }
          
                  function wait(ms) {
                      return new Promise(r => setTimeout(r, ms));
                  }
          
                  // Boot
                  initGateGrid();
                  initCanvas();
                  log('MRNN Engine initialized');
                  log('64 gates | 36 channels | 5 layers');
                  log('Ready for signal input...');
              </script>
          </body>
          </html>
