              def test_end_to_end(self):
                  net = MRNN(seed_hexagram=1)
                  orch = AutonomousOrchestrator(mrnn=net)
                  orch.boot()
          
                  # Ingest -> Analyze -> Address -> Send -> Execute
                  result = orch.cycle("INIT")
                  self.assertEqual(result["phase"], "IDLE")  # After cycle completes
                  self.assertTrue(len(result["callbacks"]) > 0)
          
              def test_orchestrator_status(self):
